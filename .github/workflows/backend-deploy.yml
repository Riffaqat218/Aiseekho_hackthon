    #       SUPABASE_URL=${{ secrets.SUPABASE_URL }}
    #       SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
    #       OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
    
    - name: Deployment Success Notification
      run: echo "Backend deployment triggered successfully."
